server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: sentinel-backend

  # ── Database (H2 for dev, switch to PostgreSQL for prod) ──
  datasource:
    url: jdbc:h2:mem:sentineldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # ── OAuth2 ──
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
          github:
            client-id: ${GITHUB_CLIENT_ID:your-github-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:your-github-client-secret}
            scope: read:user,user:email

# ── JWT ──
sentinel:
  jwt:
    secret: ${JWT_SECRET:sentinel-super-secret-key-change-in-production-must-be-256-bits-long}
    expiration-ms: 86400000   # 24 hours
    refresh-expiration-ms: 604800000  # 7 days

# ── CORS ──
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:3000

# ── Logging ──
logging:
  level:
    com.sentinel: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO

---
# ── PRODUCTION PROFILE ──
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sentineldb}
    username: ${DB_USER:sentinel}
    password: ${DB_PASS:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
